# Common environment variables
x-common-env: &common-env
  PYTHONUNBUFFERED: "1"
  REDIS_URL: redis://redis:6379/0
  S3_ENDPOINT: http://minio:9000
  S3_ACCESS_KEY: minioadmin
  S3_SECRET_KEY: minioadmin
  S3_BUCKET: dance-videos

# Device-specific environment anchors
x-cpu-env: &cpu-env
  <<: *common-env
  DATABASE_URL: postgresql://danceuser:dancepass@postgres:5432/dancedb

x-nvidia-env: &nvidia-env
  <<: *common-env
  DATABASE_URL: postgresql://danceuser:dancepass@postgres:5432/dancedb
  CUDA_VISIBLE_DEVICES: "0"
  DEVICE_TYPE: cuda

x-amd-env: &amd-env
  <<: *common-env
  DATABASE_URL: postgresql://danceuser:dancepass@postgres:5432/dancedb
  HIP_VISIBLE_DEVICES: "0"
  DEVICE_TYPE: rocm

x-mac-env: &mac-env
  <<: *common-env
  DATABASE_URL: postgresql://danceuser:dancepass@postgres:5432/dancedb
  DEVICE_TYPE: mps

# Common worker configuration anchor
x-video-worker-common: &video-worker-common
  build:
    context: ./video_processing
    dockerfile: Dockerfile
  volumes:
    - ./video_processing:/workspace
    - video-temp:/workspace/temp
  depends_on:
    postgres:
      condition: service_healthy
    minio:
      condition: service_healthy
  networks:
    - dance-network
  restart: unless-stopped
  command: ["python3", "worker.py"]

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dance-backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=dance-videos
      - USE_MOCK_ANALYSIS=${USE_MOCK_ANALYSIS:-false}
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_URL=postgresql://danceuser:dancepass@postgres:5432/dancedb
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    volumes:
      - ./backend:/app:ro
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - dance-network
    restart: unless-stopped
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  redis:
    image: redis:7-alpine
    container_name: dance-redis
    ports:
      - "6379:6379"
    networks:
      - dance-network
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: dance-minio
    ports:
      - "9000:9000"      # API
      - "9001:9001"      # Console
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    networks:
      - dance-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Create bucket on startup
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - dance-network
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/dance-videos --ignore-existing;
      mc anonymous set download myminio/dance-videos;
      exit 0;
      "

  postgres:
    image: postgres:15-alpine
    container_name: dance-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=danceuser
      - POSTGRES_PASSWORD=dancepass
      - POSTGRES_DB=dancedb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - dance-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U danceuser -d dancedb"]
      interval: 10s
      timeout: 5s
      retries: 5

  video-worker-cpu:
    <<: *video-worker-common
    container_name: dance-video-worker-cpu
    environment: *cpu-env
    profiles:
      - cpu

  video-worker-nvidia:
    <<: *video-worker-common
    container_name: dance-video-worker-nvidia
    environment: *nvidia-env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - nvidia

  video-worker-amd:
    <<: *video-worker-common
    container_name: dance-video-worker-amd
    environment: *amd-env
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
    deploy:
      resources:
        reservations:
          devices:
            - driver: amd
              count: 1
              capabilities: [gpu]
    profiles:
      - amd

  video-worker-mac:
    <<: *video-worker-common
    container_name: dance-video-worker-mac
    environment: *mac-env
    profiles:
      - mac

  rq-dashboard:
    image: eoranged/rq-dashboard
    container_name: dance-rq-dashboard
    ports:
      - "9181:9181"
    environment:
      - RQ_DASHBOARD_REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - dance-network
    restart: unless-stopped
    profiles:
      - nvidia
      - amd
      - mac
      - amd
      - mac

  # Logging infrastructure
  loki:
    image: grafana/loki:2.9.4
    container_name: dance-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - dance-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--output-document=-", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  alloy:
    image: grafana/alloy:latest
    container_name: dance-alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - dance-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.3.1
    container_name: dance-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SERVER_ROOT_URL=https://logs.valoren.click
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - dance-network
    restart: unless-stopped

volumes:
  redis-data:
    driver: local
  minio-data:
    driver: local
  video-temp:
    driver: local
  loki-data:
    driver: local
  grafana-data:
  postgres-data:
    driver: local

networks:
  dance-network:
    driver: bridge
