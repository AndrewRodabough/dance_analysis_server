# Common environment variables
x-common-env: &common-env
  PYTHONUNBUFFERED: ${PYTHONUNBUFFERED}
  REDIS_URL: ${REDIS_URL}
  S3_ENDPOINT: ${S3_ENDPOINT}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY}
  S3_SECRET_KEY: ${S3_SECRET_KEY}
  S3_BUCKET: ${S3_BUCKET}

  R2_ENDPOINT: ${R2_ENDPOINT}
  R2_BUCKET: ${R2_BUCKET}
  R2_ACCESS_KEY: ${R2_ACCESS_KEY}
  R2_SECRET_KEY: ${R2_SECRET_KEY}

# Device-specific environment anchors
x-cpu-env: &cpu-env
  <<: *common-env
  DATABASE_URL: ${DATABASE_URL}
  DEVICE_TYPE: cpu

x-nvidia-env: &nvidia-env
  <<: *common-env
  DATABASE_URL: ${DATABASE_URL}
  CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES}
  DEVICE_TYPE: cuda

x-amd-env: &amd-env
  <<: *common-env
  DATABASE_URL: ${DATABASE_URL}
  HIP_VISIBLE_DEVICES: ${HIP_VISIBLE_DEVICES}
  DEVICE_TYPE: rocm

x-mac-env: &mac-env
  <<: *common-env
  DATABASE_URL: ${DATABASE_URL}
  DEVICE_TYPE: mps

# Common worker configuration anchor
x-video-worker-common: &video-worker-common
  build:
    context: ./video_processing
    dockerfile: Dockerfile
  volumes:
    - ./video_processing:/workspace
    - video-temp:/workspace/temp
  depends_on:
    postgres:
      condition: service_healthy
    minio:
      condition: service_healthy
  networks:
    - dance-network
  restart: unless-stopped
  command: ["python3", "worker.py"]

services:
  backend:
    env_file:
      - .env
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dance-backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=${REDIS_URL}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_PUBLIC_ENDPOINT=${S3_PUBLIC_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - USE_MOCK_ANALYSIS=${USE_MOCK_ANALYSIS}
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED}
      - LOG_LEVEL=${LOG_LEVEL}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
    volumes:
      - ./backend:/app:ro
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - dance-network
    restart: unless-stopped
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]

  redis:
    image: redis:7-alpine
    env_file:
      - .env
    container_name: dance-redis
    ports:
      - "6379:6379"
    networks:
      - dance-network
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    env_file:
      - .env
    container_name: dance-minio
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY}
    volumes:
      - minio-data:/data
    networks:
      - dance-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Create bucket on startup
  minio-init:
    image: minio/mc:latest
    env_file:
      - .env
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - dance-network
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio ${S3_ENDPOINT} ${S3_ACCESS_KEY} ${S3_SECRET_KEY};
      mc mb myminio/${S3_BUCKET} --ignore-existing;
      mc anonymous set download myminio/${S3_BUCKET};
      exit 0;
      "

  postgres:
    image: postgres:15-alpine
    env_file:
      - .env
    container_name: dance-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - dance-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U danceuser -d dancedb"]
      interval: 10s
      timeout: 5s
      retries: 5

  video-worker-cpu:
    <<: *video-worker-common
    container_name: dance-video-worker-cpu
    env_file:
      - .env
    environment: *cpu-env
    profiles:
      - cpu

  video-worker-nvidia:
    <<: *video-worker-common
    container_name: dance-video-worker-nvidia
    env_file:
      - .env
    environment: *nvidia-env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - nvidia

  video-worker-amd:
    <<: *video-worker-common
    container_name: dance-video-worker-amd
    env_file:
      - .env
    environment: *amd-env
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
    deploy:
      resources:
        reservations:
          devices:
            - driver: amd
              count: 1
              capabilities: [gpu]
    profiles:
      - amd

  video-worker-mac:
    <<: *video-worker-common
    container_name: dance-video-worker-mac
    env_file:
      - .env
    environment: *mac-env
    profiles:
      - mac

  rq-dashboard:
    image: eoranged/rq-dashboard
    env_file:
      - .env
    container_name: dance-rq-dashboard
    ports:
      - "9181:9181"
    environment:
      - RQ_DASHBOARD_REDIS_URL=${RQ_DASHBOARD_REDIS_URL}
    depends_on:
      - redis
    networks:
      - dance-network
    restart: unless-stopped
    profiles:
      - nvidia
      - amd
      - mac
      - amd
      - mac

  # Logging infrastructure
  loki:
    image: grafana/loki:2.9.4
    container_name: dance-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - dance-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--output-document=-",
          "http://localhost:3100/ready",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  alloy:
    image: grafana/alloy:latest
    container_name: dance-alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - dance-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.3.1
    env_file:
      - .env
    container_name: dance-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SERVER_ROOT_URL=${GF_SERVER_ROOT_URL}
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=${GF_USERS_ALLOW_SIGN_UP}
      - GF_AUTH_ANONYMOUS_ENABLED=${GF_AUTH_ANONYMOUS_ENABLED}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=${GF_AUTH_ANONYMOUS_ORG_ROLE}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - dance-network
    restart: unless-stopped

volumes:
  redis-data:
    driver: local
  minio-data:
    driver: local
  video-temp:
    driver: local
  loki-data:
    driver: local
  grafana-data:
  postgres-data:
    driver: local

networks:
  dance-network:
    driver: bridge
