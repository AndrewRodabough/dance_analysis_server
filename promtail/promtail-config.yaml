server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Only keep containers with "dance-" prefix
      - source_labels: ['__meta_docker_container_name']
        regex: '/(dance-.*)'
        target_label: container_name
      - source_labels: ['__meta_docker_container_name']
        regex: '/dance-.*'
        action: keep
    pipeline_stages:
      # Parse Docker JSON log wrapper
      - json:
          expressions:
            output: log
            stream: stream
      - output:
          source: output
      - labels:
          stream:
      # Parse our app's JSON logs
      - json:
          expressions:
            level: level
            event_type: event_type
      - labels:
          level:
          event_type:
